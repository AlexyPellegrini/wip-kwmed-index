name: Update PyPI Index

on:
  repository_dispatch:
    types: [new-release] # This is the custom event name we will listen for

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit the updated HTML files back to the repo

    steps:
      - name: Checkout Index Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Update HTML Files
        env:
          PROJECT_NAME: ${{ github.event.client_payload.project_name }}
          WHEEL_NAME: ${{ github.event.client_payload.wheel_name }}
          WHEEL_URL: ${{ github.event.client_payload.wheel_url }}
          SHA256: ${{ github.event.client_payload.sha256 }}
        run: |
          python update_index.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html ${{ github.event.client_payload.project_name }}/index.html
          git commit -m "Add ${{ github.event.client_payload.wheel_name }} to index"
          git push
